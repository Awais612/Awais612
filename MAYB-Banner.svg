<svg viewBox="0 0 1024 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Welcome to Muhammad Awais Yousaf Butt — Software Developer">
  <defs>
    <!-- subtle dark texture background -->
    <radialGradient id="bg" cx="0.5" cy="0.45" r="0.75">
      <stop offset="0" stop-color="#2b2530"/>
      <stop offset="1" stop-color="#1a1620"/>
    </radialGradient>
    <style>
      .disp { font-family: 'Archivo Black','Arial Black',sans-serif; font-weight: 900; }
      .scr  { font-family: 'Georgia', serif; font-style: italic; }
      .pill { font-family: 'Arial Black', sans-serif; font-weight: 800; letter-spacing: 1px; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1024" height="420" rx="14" fill="url(#bg)"/>

  <!-- ===== corner geometric cutouts (top-right, bottom-left) ===== -->
  <path d="M1024 0 L1024 130 L900 0 Z" fill="#ff3ea5" opacity="0.55"/>
  <path d="M1024 0 L1024 90 L950 0 Z" fill="#2b2530"/>
  <path d="M0 420 L0 300 L110 420 Z" fill="#ff3ea5" opacity="0.5"/>
  <path d="M0 420 L0 340 L70 420 Z" fill="#1a1620"/>

  <!-- ===== squiggle doodles ===== -->
  <g fill="none" stroke="#c04dbb" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <path d="M60 150 C90 130 100 175 130 155 C160 135 168 178 200 158"/>
    <path d="M40 230 C70 210 80 252 110 232"/>
  </g>
  <g fill="none" stroke="#3fd4d4" stroke-width="2.5" stroke-linecap="round" opacity="0.55">
    <path d="M840 120 C880 100 890 145 930 125 C955 112 965 150 995 132"/>
    <path d="M860 175 C895 158 905 198 940 180"/>
  </g>
  <g fill="none" stroke="#c04dbb" stroke-width="2.5" stroke-linecap="round" opacity="0.5">
    <path d="M620 360 C660 340 680 385 720 365 C760 345 780 388 820 368"/>
  </g>

  <!-- sparkle diamonds -->
  <path d="M940 320 l8 14 14 8 -14 8 -8 14 -8 -14 -14 -8 14 -8 Z" fill="#e8e2ee" opacity="0.85"/>
  <path d="M120 60 l5 9 9 5 -9 5 -5 9 -5 -9 -9 -5 9 -5 Z" fill="#e8e2ee" opacity="0.6"/>

  <!-- ============ TEXT ============ -->
  <text x="512" y="118" text-anchor="middle" class="disp" font-size="34" fill="#e8e2ee">WELCOME
    <tspan class="scr" font-size="30" fill="#c9c2d0" font-weight="400"> to</tspan>
  </text>

  <text x="512" y="195" text-anchor="middle" class="disp" font-size="70" fill="#2ee6e6" letter-spacing="1">MUHAMMAD AWAIS</text>
  <text x="512" y="262" text-anchor="middle" class="disp" font-size="70" fill="#2ee6e6" letter-spacing="1">YOUSAF BUTT</text>

  <!-- SOFTWARE DEVELOPER pill -->
  <g transform="translate(512 298)">
    <rect x="-135" y="-19" width="270" height="38" rx="19" fill="#c93ec9"/>
    <text x="0" y="6" text-anchor="middle" class="pill" font-size="17" fill="#1a1620">SOFTWARE DEVELOPER</text>
  </g>

  <!-- GitHub wordmark + cat -->
  <text x="770" y="300" class="disp" font-size="30" fill="#e8e2ee">GitHub</text>
  <g transform="translate(880 278)">
    <rect x="0" y="0" width="34" height="30" rx="4" fill="#c95bc9"/>
    <rect x="4" y="-5" width="7" height="10" fill="#c95bc9"/>
    <rect x="23" y="-5" width="7" height="10" fill="#c95bc9"/>
    <circle cx="11" cy="12" r="2.5" fill="#1a1620"/>
    <circle cx="23" cy="12" r="2.5" fill="#1a1620"/>
    <path d="M13 20 h8 M17 18 v5" stroke="#1a1620" stroke-width="1.5"/>
  </g>

  <!-- ============ RETRO STICKERS ============ -->

  <!-- Vintage computer (top-left) -->
  <g transform="translate(175 95) rotate(-8)">
    <rect x="0" y="0" width="72" height="80" rx="10" fill="#c93ec9" stroke="#7a2a7a" stroke-width="3"/>
    <rect x="10" y="10" width="52" height="42" rx="4" fill="#2ee6e6"/>
    <rect x="14" y="14" width="44" height="34" rx="2" fill="#1a4d4d" opacity="0.5"/>
    <circle cx="20" cy="66" r="4" fill="#f5d547"/>
    <rect x="30" y="62" width="30" height="8" rx="2" fill="#7a2a7a"/>
  </g>

  <!-- Pixel sunglasses with heart (bottom-left) -->
  <g transform="translate(155 275) rotate(-6)">
    <rect x="0" y="10" width="42" height="26" rx="4" fill="#2ee6e6" stroke="#c93ec9" stroke-width="3"/>
    <rect x="52" y="10" width="42" height="26" rx="4" fill="#2ee6e6" stroke="#c93ec9" stroke-width="3"/>
    <path d="M42 20 h10" stroke="#c93ec9" stroke-width="4"/>
    <path d="M0 22 l-10 -4" stroke="#c93ec9" stroke-width="4"/>
    <path d="M94 22 l10 -4" stroke="#c93ec9" stroke-width="4"/>
    <!-- heart -->
    <path d="M60 -8 c-4 -6 -13 -3 -13 4 c0 6 13 13 13 13 c0 0 13 -7 13 -13 c0 -7 -9 -10 -13 -4 Z" fill="#ff2d55"/>
  </g>

  <!-- VHS / cassette tape (bottom-center-left) -->
  <g transform="translate(300 305) rotate(4)">
    <rect x="0" y="0" width="110" height="62" rx="8" fill="#3a3340" stroke="#c93ec9" stroke-width="3"/>
    <rect x="12" y="12" width="86" height="30" rx="4" fill="#2ee6e6"/>
    <circle cx="38" cy="27" r="9" fill="#1a1620"/>
    <circle cx="72" cy="27" r="9" fill="#1a1620"/>
    <circle cx="38" cy="27" r="3" fill="#f5d547"/>
    <circle cx="72" cy="27" r="3" fill="#f5d547"/>
    <rect x="20" y="50" width="70" height="6" rx="3" fill="#f5d547"/>
  </g>

  <!-- Film / movie camera (top-right) -->
  <g transform="translate(640 30) rotate(6)">
    <circle cx="20" cy="18" r="17" fill="none" stroke="#c93ec9" stroke-width="6"/>
    <circle cx="52" cy="18" r="17" fill="none" stroke="#c93ec9" stroke-width="6"/>
    <rect x="8" y="34" width="70" height="34" rx="5" fill="#f5d547" stroke="#c93ec9" stroke-width="3"/>
    <path d="M78 44 l20 -10 v40 l-20 -10 Z" fill="#2ee6e6" stroke="#c93ec9" stroke-width="3"/>
    <circle cx="24" cy="51" r="4" fill="#1a1620"/>
  </g>
</svg>
